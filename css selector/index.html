<html lang = "en">
    <head>
        <meta charset = "UTF-8">
        <title> CSS Selectors </title>

    </head>
    <body>
        <link rel="stylesheet" href="style.css">
        <h1> CSS Selectors </h1>
        --- class selector ---
        <h2 class = "red-text"> Types of CSS Selectors </h2>
        --- id selector ---
        <h3 id = "first-heading">Id selector</h3>
        ---ATTRIBUTE SELECTOR
        <p draggable = "true">Id selector is applied only to single and unique elements</p>
        <p draggable = "false">The id value is unique</p>

    </body>
</html>
